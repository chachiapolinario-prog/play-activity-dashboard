<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Activity | Chachi Apolinario</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; background: #f5f5f5; color: #1a1a1a; font-size: 14px; line-height: 1.6; }

    .header { background: #008060; color: white; padding: 32px 48px; display: flex; justify-content: space-between; align-items: flex-end; }
    .header h1 { font-size: 22px; font-weight: 700; }
    .header p { margin-top: 4px; font-size: 13px; opacity: 0.8; }
    .header-meta { text-align: right; font-size: 12px; opacity: 0.75; line-height: 1.9; }

    .container { max-width: 960px; margin: 0 auto; padding: 36px 48px; }

    /* Weekly effort bar */
    .effort-bar { background: white; border-radius: 8px; border: 1px solid #e5e5e5; padding: 28px 32px; margin-bottom: 24px; }
    .effort-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #008060; margin-bottom: 20px; }
    .effort-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .effort-item { }
    .effort-label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
    .effort-numbers { display: flex; align-items: baseline; gap: 6px; margin-bottom: 8px; }
    .effort-actual { font-size: 32px; font-weight: 700; }
    .effort-target { font-size: 13px; color: #aaa; }
    .effort-actual.green { color: #008060; }
    .effort-actual.amber { color: #e67e22; }
    .effort-actual.red { color: #c0392b; }
    .effort-actual.neutral { color: #1a1a1a; }
    .bar-track { background: #f0f0f0; border-radius: 4px; height: 6px; overflow: hidden; }
    .bar-fill { height: 6px; border-radius: 4px; }
    .bar-fill.green { background: #008060; }
    .bar-fill.amber { background: #e67e22; }
    .bar-fill.red { background: #c0392b; }
    .bar-fill.blue { background: #2980b9; }

    /* Play cards */
    .plays-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-bottom: 24px; }
    .play-card { background: white; border-radius: 8px; border: 1px solid #e5e5e5; padding: 24px 28px; }
    .play-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 16px; }
    .play-card-title { font-size: 14px; font-weight: 700; color: #1a1a1a; }
    .play-card-sub { font-size: 12px; color: #888; margin-top: 2px; }
    .status-badge { font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; white-space: nowrap; }
    .status-active { background: #e8f5f0; color: #008060; }
    .status-building { background: #fef5e7; color: #e67e22; }
    .status-starting { background: #f0f0f0; color: #888; }

    .play-stats { display: flex; gap: 20px; margin-bottom: 14px; }
    .play-stat-item { }
    .play-stat-val { font-size: 22px; font-weight: 700; color: #1a1a1a; }
    .play-stat-val.green { color: #008060; }
    .play-stat-lbl { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.4px; }

    .play-note { font-size: 12px; color: #555; line-height: 1.6; padding-top: 14px; border-top: 1px solid #f0f0f0; }
    .play-note strong { color: #1a1a1a; }

    /* Highlights */
    .highlights { background: white; border-radius: 8px; border: 1px solid #e5e5e5; padding: 24px 28px; margin-bottom: 24px; }
    .highlights-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: #008060; margin-bottom: 14px; }
    .highlight-item { padding: 10px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; color: #333; display: flex; gap: 10px; align-items: flex-start; }
    .highlight-item:last-child { border-bottom: none; }
    .highlight-dot { width: 6px; height: 6px; border-radius: 50%; background: #008060; margin-top: 7px; flex-shrink: 0; }
    .highlight-dot.amber { background: #e67e22; }

    .update-tip { background: #f9f9f9; border: 1px solid #e5e5e5; border-radius: 6px; padding: 14px 18px; font-size: 12px; color: #888; margin-bottom: 24px; }
    .update-tip code { background: #eee; padding: 1px 5px; border-radius: 3px; font-family: monospace; }

    @media (max-width: 768px) {
      .effort-grid { grid-template-columns: repeat(2, 1fr); }
      .plays-grid { grid-template-columns: 1fr; }
      .container { padding: 24px 20px; }
      .header { padding: 24px 20px; flex-direction: column; gap: 10px; }
    }
  </style>
</head>
<body>

<script>
// ============================================================
// UPDATE THIS EACH WEEK — real numbers only
// ============================================================
const data = {
  weekOf: "May 5 – 9, 2026",
  updatedAt: "May 9, 2026",

  // Weekly actuals — fill in what actually happened
  weekly: {
    calls: 0,           // calls made this week
    callsTarget: 50,    // 10/day x 5 days
    emails: 0,          // emails sent this week
    emailsTarget: 35,   // 7/day x 5 days
  },

  // Closed lost re-engagement — running total
  closedLost: {
    dialed: 50,
    totalList: 70,
    oppsCreated: 2,
    opps: ["Weatherbeeta", "Weareco"],
    note: "2 opps created from 50 dials. 20 accounts remaining on the list."
  },

  // BigCommerce play
  bigcommerce: {
    status: "building",   // active | building | starting
    accountsContacted: 0,
    responses: 0,
    note: "Pillow Talk is the anchor deal in active pipeline. Broader BC outreach starting."
  },

  // WooCommerce play
  woocommerce: {
    status: "starting",
    accountsContacted: 0,
    responses: 0,
    note: "Play identified. Outreach cadence to start week of May 12."
  },

  // Vertical play (Health & Beauty)
  vertical: {
    status: "active",
    accountsContacted: 4,
    responses: 1,
    note: "Gr8 Health (MD Sam Godfrey) — replied, open to a Q3 conversation. NAK Hair — voicemail left, following up."
  },

  // Key highlights for JJ — what you want him to know this week
  highlights: [
    { text: "Weatherbeeta and Weareco re-opened from the closed lost list. Both now active opportunities.", type: "green" },
    { text: "Gr8 Health replied to outreach — MD open to a conversation in Q3. First real response from the health & beauty play.", type: "green" },
    { text: "Pillow Talk still the priority BigCommerce account. Working on C-suite access alongside Matter.", type: "amber" },
    { text: "WooCommerce and broader BC outreach starting next week.", type: "neutral" },
  ]
};
// ============================================================
</script>

<div class="header">
  <div>
    <h1>Weekly Activity</h1>
    <p id="sub">Chachi Apolinario &nbsp;|&nbsp; ANZ Mid-Market</p>
  </div>
  <div class="header-meta">
    <span id="weekOf"></span><br>
    <span id="updatedAt"></span>
  </div>
</div>

<div class="container">

  <div class="update-tip">Update the <code>data</code> block at the top of this file each week. Real numbers only — calls, emails, and what actually happened.</div>

  <!-- Weekly effort -->
  <div class="effort-bar">
    <div class="effort-title">This Week</div>
    <div class="effort-grid" id="effortGrid"></div>
  </div>

  <!-- Highlights for JJ -->
  <div class="highlights">
    <div class="highlights-title">What JJ needs to know</div>
    <div id="highlightsList"></div>
  </div>

  <!-- Play cards -->
  <div class="plays-grid" id="playsGrid"></div>

</div>

<script>
function pct(val, target) { return Math.min(100, Math.round((val / target) * 100)); }
function color(p) { return p >= 80 ? "green" : p >= 50 ? "amber" : "red"; }

// Header
document.getElementById("sub").textContent = "Chachi Apolinario \u00a0|\u00a0 ANZ Mid-Market";
document.getElementById("weekOf").textContent = "Week of " + data.weekOf;
document.getElementById("updatedAt").textContent = "Updated " + data.updatedAt;

// Weekly effort
const w = data.weekly;
const cl = data.closedLost;
const callPct = pct(w.calls, w.callsTarget);
const emailPct = pct(w.emails, w.emailsTarget);
const dialPct = pct(cl.dialed, cl.totalList);

document.getElementById("effortGrid").innerHTML = `
  <div class="effort-item">
    <div class="effort-label">Calls this week</div>
    <div class="effort-numbers">
      <span class="effort-actual ${w.calls === 0 ? 'neutral' : color(callPct)}">${w.calls}</span>
      <span class="effort-target">/ ${w.callsTarget}</span>
    </div>
    <div class="bar-track"><div class="bar-fill ${color(callPct)}" style="width:${callPct}%"></div></div>
  </div>
  <div class="effort-item">
    <div class="effort-label">Emails this week</div>
    <div class="effort-numbers">
      <span class="effort-actual ${w.emails === 0 ? 'neutral' : color(emailPct)}">${w.emails}</span>
      <span class="effort-target">/ ${w.emailsTarget}</span>
    </div>
    <div class="bar-track"><div class="bar-fill ${color(emailPct)}" style="width:${emailPct}%"></div></div>
  </div>
  <div class="effort-item">
    <div class="effort-label">Closed lost dialed</div>
    <div class="effort-numbers">
      <span class="effort-actual ${color(dialPct)}">${cl.dialed}</span>
      <span class="effort-target">/ ${cl.totalList}</span>
    </div>
    <div class="bar-track"><div class="bar-fill ${color(dialPct)}" style="width:${dialPct}%"></div></div>
  </div>
  <div class="effort-item">
    <div class="effort-label">Opps from closed lost</div>
    <div class="effort-numbers">
      <span class="effort-actual green">${cl.oppsCreated}</span>
    </div>
    <div class="bar-track"><div class="bar-fill green" style="width:100%"></div></div>
  </div>
`;

// Highlights
const hl = data.highlights;
document.getElementById("highlightsList").innerHTML = hl.map(h => `
  <div class="highlight-item">
    <div class="highlight-dot ${h.type === 'amber' ? 'amber' : ''}"></div>
    <div>${h.text}</div>
  </div>`).join("");

// Play cards
function statusLabel(s) {
  if (s === "active") return `<span class="status-badge status-active">Active</span>`;
  if (s === "building") return `<span class="status-badge status-building">Building</span>`;
  return `<span class="status-badge status-starting">Starting</span>`;
}

const plays = [
  {
    title: "Closed Lost Re-engagement",
    sub: "70-account dial list",
    stats: [
      { val: cl.dialed, lbl: "Dialed", green: true },
      { val: cl.totalList - cl.dialed, lbl: "Remaining", green: false },
      { val: cl.oppsCreated, lbl: "Opps created", green: true }
    ],
    note: cl.note + (cl.opps.length ? " <strong>Opps:</strong> " + cl.opps.join(", ") + "." : ""),
    status: "active"
  },
  {
    title: "Health & Beauty Vertical",
    sub: "Outbound play",
    stats: [
      { val: data.vertical.accountsContacted, lbl: "Accounts contacted", green: false },
      { val: data.vertical.responses, lbl: "Responses", green: true }
    ],
    note: data.vertical.note,
    status: data.vertical.status
  },
  {
    title: "BigCommerce Migration",
    sub: "Competitive play",
    stats: [
      { val: data.bigcommerce.accountsContacted, lbl: "Accounts contacted", green: false },
      { val: data.bigcommerce.responses, lbl: "Responses", green: false }
    ],
    note: data.bigcommerce.note,
    status: data.bigcommerce.status
  },
  {
    title: "WooCommerce Migration",
    sub: "Competitive play",
    stats: [
      { val: data.woocommerce.accountsContacted, lbl: "Accounts contacted", green: false },
      { val: data.woocommerce.responses, lbl: "Responses", green: false }
    ],
    note: data.woocommerce.note,
    status: data.woocommerce.status
  }
];

document.getElementById("playsGrid").innerHTML = plays.map(p => `
  <div class="play-card">
    <div class="play-card-header">
      <div>
        <div class="play-card-title">${p.title}</div>
        <div class="play-card-sub">${p.sub}</div>
      </div>
      ${statusLabel(p.status)}
    </div>
    <div class="play-stats">
      ${p.stats.map(s => `
        <div class="play-stat-item">
          <div class="play-stat-val ${s.green && s.val > 0 ? 'green' : ''}">${s.val}</div>
          <div class="play-stat-lbl">${s.lbl}</div>
        </div>`).join("")}
    </div>
    <div class="play-note">${p.note}</div>
  </div>`).join("");
</script>

</body>
</html>
